<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Agent Console</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
overflow:hidden;
font-family:Poppins;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.app{
height:100vh;
width:100vw;
display:flex;
flex-direction:column;
}

.header{
padding:18px 25px;
font-size:20px;
font-weight:600;
background:#020617;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.main{
flex:1;
display:flex;
height:100%;
overflow:hidden;
}

.chat{
flex:2;
display:flex;
flex-direction:column;
border-right:1px solid rgba(255,255,255,0.08);
height:100%;
}

.messages{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:12px 16px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.agent{
background:#1e293b;
align-self:flex-start;
}

.input-area{
display:flex;
padding:18px;
background:#020617;
border-top:1px solid rgba(255,255,255,0.08);
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
margin-right:10px;
font-size:14px;
outline:none;
}

button{
padding:12px 20px;
border:none;
background:#4f46e5;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#4338ca;
}

.logs{
flex:1;
display:flex;
flex-direction:column;
height:100%;
background:#020617;
}

.log-header{
padding:18px;
font-weight:600;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.log-container{
flex:1;
overflow-y:auto;
padding:15px;
font-size:13px;
color:#9ca3af;
}

.log{
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
AI Agent
</div>

<div class="main">

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="queryInput" placeholder="Ask something..." />
<button onclick="sendQuery()">Send</button>
</div>

</div>

<div class="logs">

<div class="log-header">
⚙ Agent Logs
</div>

<div id="logs" class="log-container"></div>

</div>

</div>

</div>

<script>

const API="http://localhost:8000/ask"

function log(msg){

const logBox=document.getElementById("logs")

const el=document.createElement("div")
el.className="log"
el.innerText=msg

logBox.appendChild(el)

logBox.scrollTop=logBox.scrollHeight
}

function message(text,type){

const box=document.getElementById("messages")

const el=document.createElement("div")
el.className="message "+type
el.innerText=text

box.appendChild(el)

box.scrollTop=box.scrollHeight
}

async function sendQuery(){

const input=document.getElementById("queryInput")
const query=input.value.trim()

if(!query) return

message(query,"user")

log("User query received")
log("Sending request to backend")

input.value=""

try{

const res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({query})
})

log("Agent processing...")

const data=await res.json()

message(data.answer || JSON.stringify(data),"agent")

log("Response received")
log("Process completed")

}catch(e){

log("Backend connection failed")
console.error(e)

}

}

document.getElementById("queryInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendQuery()
}

})

</script>

</body>
</html>
